name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pywebview pyinstaller

      - name: Build exe
        run: pyinstaller --noconfirm --onefile --windowed --name "YouTubeSubCounter" --add-data "ui;ui" widget.py

      - name: Smoke test (exe exists)
        run: |
          if (-not (Test-Path "dist/YouTubeSubCounter.exe")) { exit 1 }
          Get-Item dist/YouTubeSubCounter.exe | Format-List Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeSubCounter
          path: dist/YouTubeSubCounter.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/YouTubeSubCounter.exe
          generate_release_notes: true
